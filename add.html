<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Add Karo</title>
  <style>
    body { font-family: Arial; background: #f0f4f8; margin: 0; padding: 20px; }
    .container { max-width: 500px; margin: auto; }
    h1 { color: #1e3a5f; }
    .card { background: white; padding: 28px; border-radius: 12px; box-shadow: 0 2px 8px #0001; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: bold; color: #2d3748; margin-bottom: 6px; font-size: 14px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    input:focus { outline: none; border-color: #2b6cb0; }
    .btn-save { background: #2b6cb0; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; }
    .btn-back { display: inline-block; color: #2b6cb0; text-decoration: none; margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <h1>➕ Student Add Karo</h1>

  <div class="card">
    <!-- Form — POST method use karo data bhejne ke liye -->
    <form method="POST">
      {% csrf_token %}  <!-- Security token — zaroori hai -->

      <div class="form-group">
        <label>Student Ka Naam</label>
        <input type="text" name="name" placeholder="Ali Ahmed" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="ali@example.com" required>
      </div>

      <div class="form-group">
        <label>Subject</label>
        <input type="text" name="subject" placeholder="Mathematics" required>
      </div>

      <div class="form-group">
        <label>Marks (0-100)</label>
        <input type="number" name="marks" min="0" max="100" placeholder="85" required>
      </div>

      <button type="submit" class="btn-save">💾 Save Karo</button>
    </form>

    <a href="{% url 'home' %}" class="btn-back">← Wapas Jao</a>
  </div>
</div>
</body>
</html>
